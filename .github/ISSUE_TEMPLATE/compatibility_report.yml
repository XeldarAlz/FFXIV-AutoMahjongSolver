name: Compatibility report
description: Confirm whether a region's Doman Mahjong client works (or doesn't).
title: "[Compat] "
labels: ["compatibility"]
body:
  - type: markdown
    attributes:
      value: |
        Use this to grow the [client compatibility matrix](https://github.com/XeldarAlz/FFXIV-DomanMahjongSolver#client-compatibility). EU (`Emj`) is the reference variant; NA (`EmjL`), JP, and OC need user verification.

        **Easiest path:** seat at a Doman Mahjong table, run `/mjauto variant dump`, and attach the file in the Attachments field. That single file is enough to wire a new client up.

        If something is broken, prefer the [bug report](https://github.com/XeldarAlz/FFXIV-DomanMahjongSolver/issues/new?template=bug_report.yml) template; it has the fields to debug it.

  - type: dropdown
    id: region
    attributes:
      label: Region / client
      options:
        - EU (Emj)
        - NA (EmjL)
        - JP
        - OC
    validations:
      required: true

  - type: dropdown
    id: plugin-version
    attributes:
      label: Plugin version
      description: Shown in `/xlplugins` next to "Doman Mahjong Solver".
      options:
        - 0.1.1.0
        - 0.1.0.12
        - 0.1.0.11
        - 0.1.0.10
        - 0.1.0.9
        - Older / not sure
    validations:
      required: true

  - type: checkboxes
    id: features
    attributes:
      label: What worked?
      description: Tick each feature you successfully exercised on this client. Leave blank if you only ran a variant dump.
      options:
        - label: Window detection (plugin sees the table)
        - label: Hand / score reading (correct tiles and scores)
        - label: Discard from in-hand (state-30)
        - label: Discard from self-declare popup (state-6)
        - label: Post-call discard popup
        - label: Pon / Chi / Kan acceptance
        - label: Riichi / Tsumo / Ron commit

  - type: textarea
    id: broken
    attributes:
      label: What didn't work?
      description: Features that failed or behaved differently from EU. Be specific: "Pon prompt didn't accept" beats "calls didn't work".
      placeholder: "Hand reads correctly but Pon prompts didn't accept; manually clicking the in-game button worked fine."

  - type: textarea
    id: attachments
    attributes:
      label: Attachments
      description: |
        - **`emj-variant-dump.txt`**: generated by `/mjauto variant dump`. Most useful file for cross-client work; even on its own it unblocks new variants.
        - **Screenshots** of the plugin window during play (Hand pane, score readout, mode indicator)
        - **Dalamud log**: open `/xllog`, click *Open log folder*, filter by `[Mahjong.Plugin.Dalamud]`

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Tested at expert/novice tables? Any other plugins active? Anything that helps reproduce.
